<!DOCTYPE html>
<html>
<head>
    <title>Project Dreams</title>

    <style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        background: white;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center; /* THIS is the missing piece */
    }

    .box {
        width: 100%;
        max-width: 500px;
    }

    input {
        padding: 8px;
        width: 200px;
        display: block;
        margin: 10px auto;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
    }

    nav a {
        display: block;
        margin-top: 10px;
    }
</style>
</head>

<body>

    <div class="box">
        <h1>PROJECT DREAMS</h1>

        <p>Enter Password:</p>

        <input type="text" id="password">
        <button onclick="checkPassword()">Submit</button>

        <div id="result"></div>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById("password").value;
            const result = document.getElementById("result");

            if (pass === "ORIGIN") {
                result.innerHTML = `
                    <h2>ACCESS GRANTED</h2>
                    <p>Welcome back.</p>

                    <nav>
                        <a href="archive.html">ARCHIVE</a>
                    </nav>
                `;
            } else {
                result.innerHTML = `<p style="color:red;">Incorrect password</p>`;
            }
        }
    </script>

</body>
</html>
