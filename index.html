<!DOCTYPE html>
<html>
<head>
    <title>Project Dreams</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .box {
            width: 100%;
            max-width: 500px;
        }

        input {
            padding: 8px;
            width: 220px;
            margin-top: 10px;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        #error {
            color: red;
            margin-top: 15px;
        }

        nav a {
            display: block;
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>PROJECT DREAMS</h1>

    <p>Enter Password:</p>

    <input type="text" id="password">
    <br>

    <button onclick="checkPassword()">Submit</button>

    <div id="result"></div>
    <div id="error"></div>

</div>

<script>

function checkPassword() {

    const pass = document.getElementById("password").value.trim().toUpperCase();

    if (pass === "ORIGIN") {

        localStorage.setItem("level", "1");
        showLevel1();

    }

    else if (pass === "UNKNOWN") {

        localStorage.setItem("level", "2");
        showLevel2();

    }

    else {

        document.getElementById("error").innerHTML = "Incorrect password.";

    }

}

function showLevel1() {

    document.getElementById("error").innerHTML = "";

    document.getElementById("result").innerHTML = `
        <h2>ACCESS GRANTED</h2>

        <p>Archive access approved.</p>

        <nav>
            <a href="archive.html">ARCHIVE</a>
        </nav>
    `;

}

function showLevel2() {

    document.getElementById("error").innerHTML = "";

    document.getElementById("result").innerHTML = `
        <h2>ACCESS LEVEL 2</h2>

        <p>Additional archive files detected.</p>

        <nav>
            <a href="archive.html">ARCHIVE</a>
        </nav>
    `;

}

window.onload = function() {

    const level = localStorage.getItem("level");

    if(level === "2"){

        showLevel2();

    }

    else if(level === "1"){

        showLevel1();

    }

};

</script>

</body>
</html>
